<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#89b4fa" />
  <title>TL;DR</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="share-page">
  <div class="card" id="card">
    <div class="logo">
      <span class="badge">TL;DR</span>
      <div>
        <div class="logo-text" id="pageTitle">Summarizing…</div>
        <div class="logo-sub" id="pageDomain"></div>
        <div style="font-size:10px;color:#45475a">v12</div>
      </div>
    </div>
    <div id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Starting…</span>
      </div>
    </div>
  </div>

  <script>
    const WORKER = "https://tldr-proxy.alatarcage.workers.dev/";

    const params      = new URLSearchParams(location.search);
    const sharedTitle = params.get("title") || "";
    // Android Chrome sometimes sends the URL in "text" instead of "url"
    const rawText     = params.get("text")  || "";
    const rawUrl      = params.get("url")   || "";
    const sharedUrl   = rawUrl || (rawText.startsWith("http") ? rawText : "");

    const titleEl  = document.getElementById("pageTitle");
    const domainEl = document.getElementById("pageDomain");
    const content  = document.getElementById("content");

    if (sharedTitle) titleEl.textContent = sharedTitle;
    if (sharedUrl) {
      try { domainEl.textContent = new URL(sharedUrl).hostname.replace("www.", ""); } catch {}
    }

    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/TLDR/sw.js");

    run();

    async function run() {
      const apiKey = localStorage.getItem("tldr_api_key");
      if (!apiKey) { showNoKey(); return; }
      if (!sharedUrl) { showError("No URL was shared. Long-press a link in Chrome → Share → TL;DR."); return; }

      try {
        setStatus("Summarizing…");
        const res = await fetch(WORKER + "?url=" + encodeURIComponent(sharedUrl) + "&key=" + encodeURIComponent(apiKey));
        if (!res.ok) {
          const msg = await res.text().catch(() => "");
          throw new Error(`[${res.status}] ${msg || "Worker error"}`);
        }
        const summary = await res.text();
        showResult(summary);
      } catch (err) {
        showError(err.message || "Something went wrong.");
      }
    }

    function setStatus(msg) {
      content.innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <span>${esc(msg)}</span>
        </div>`;
    }

    function showResult(summary) {
      titleEl.textContent = "Summary";
      content.innerHTML = `
        <div class="result-box"><p dir="auto">${esc(summary)}</p></div>
        <div class="share-actions">
          <button class="btn-secondary" id="copyBtn">Copy summary</button>
          <button class="btn-secondary" id="closeBtn">✕ Close</button>
        </div>`;
      document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(summary).then(() => {
          document.getElementById("copyBtn").textContent = "Copied ✓";
        });
      });
      document.getElementById("closeBtn").addEventListener("click", closeView);
    }

    function showError(msg) {
      titleEl.textContent = "Couldn't summarize";
      content.innerHTML = `
        <div class="error-box">${esc(msg)}</div>
        <button class="btn-secondary" onclick="closeView()">✕ Close</button>`;
    }

    function showNoKey() {
      titleEl.textContent = "Setup needed";
      content.innerHTML = `
        <div class="no-key-box">
          No API key found. Open the TL;DR app from your home screen and save your Groq API key first.
        </div>
        <a href="/TLDR/" style="display:block;margin-top:8px">
          <button class="btn-primary" style="width:100%">Go to Settings</button>
        </a>`;
    }

    function closeView() {
      if (window.history.length > 1) window.history.back();
      else window.close();
    }

    function esc(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
