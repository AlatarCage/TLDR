<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#89b4fa" />
  <title>TL;DR</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="share-page">
  <div class="card" id="card">
    <div class="logo">
      <span class="badge">TL;DR</span>
      <div>
        <div class="logo-text" id="pageTitle">Summarizing…</div>
        <div class="logo-sub" id="pageDomain"></div>
        <div style="font-size:10px;color:#45475a">v9</div>
      </div>
    </div>

    <div id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        <span>Fetching article…</span>
      </div>
    </div>
  </div>

  <script>
    const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
    const PROXY = "https://tldr-proxy.alatarcage.workers.dev/?url=";

    const params = new URLSearchParams(location.search);
    const sharedUrl   = params.get("url")   || "";
    const sharedTitle = params.get("title") || "";
    const sharedText  = params.get("text")  || "";

    const titleEl  = document.getElementById("pageTitle");
    const domainEl = document.getElementById("pageDomain");
    const content  = document.getElementById("content");

    // Show the source URL at the top
    if (sharedTitle) titleEl.textContent = sharedTitle;
    if (sharedUrl) {
      try {
        const u = new URL(sharedUrl);
        domainEl.textContent = u.hostname.replace("www.", "");
      } catch {}
    }

    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/TLDR/sw.js");

    run();

    async function run() {
      const apiKey = localStorage.getItem("tldr_api_key");
      if (!apiKey) {
        showNoKey();
        return;
      }

      if (!sharedUrl && !sharedText) {
        showError("No URL or text was shared. Try sharing a link from Chrome.");
        return;
      }

      try {
        setStatus("Fetching article…");
        const articleText = sharedText || await fetchArticle(sharedUrl);

        setStatus("Generating summary…");
        const summary = await summarize(apiKey, articleText, sharedUrl, sharedTitle);
        showResult(summary);
      } catch (err) {
        showError(err.message || "Something went wrong.");
      }
    }

    async function fetchArticle(url) {
      const res = await fetch(PROXY + encodeURIComponent(url));
      if (!res.ok) throw new Error(`Proxy error ${res.status}`);
      return extractText(await res.text());
    }

    function extractText(html) {
      return html
        .replace(/<script[\s\S]*?<\/script>/gi, " ")
        .replace(/<style[\s\S]*?<\/style>/gi, " ")
        .replace(/<nav[\s\S]*?<\/nav>/gi, " ")
        .replace(/<footer[\s\S]*?<\/footer>/gi, " ")
        .replace(/<header[\s\S]*?<\/header>/gi, " ")
        .replace(/<aside[\s\S]*?<\/aside>/gi, " ")
        .replace(/<[^>]+>/g, " ")
        .replace(/&nbsp;/g, " ").replace(/&amp;/g, "&")
        .replace(/&lt;/g, "<").replace(/&gt;/g, ">")
        .replace(/\s{2,}/g, " ")
        .trim()
        .slice(0, 8000);
    }

    async function summarize(apiKey, text, url, title) {
      const prompt = `Summarize the following news article in ONE clear English paragraph (2-4 sentences). Focus on key facts: who, what, when, where. Write directly, no filler.\n\nArticle:\n${text}`;

      const body = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 300 }
      };

      const res = await fetch(GROQ_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: "llama-3.1-8b-instant",
          messages: [{ role: "user", content: prompt }],
          max_tokens: 300
        })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`[${res.status}] ${err.error?.message || "Unknown API error"}`);
      }

      const data = await res.json();
      return data.choices?.[0]?.message?.content || "No summary generated.";
    }

    // ── UI helpers ──

    function setStatus(msg) {
      content.innerHTML = `
        <div class="loading-state">
          <div class="spinner"></div>
          <span>${esc(msg)}</span>
        </div>`;
    }

    function showResult(summary) {
      titleEl.textContent = "Summary";
      content.innerHTML = `
        <div class="result-box"><p>${esc(summary)}</p></div>
        <div class="share-actions">
          <button class="btn-secondary" id="copyBtn">Copy summary</button>
          <button class="btn-secondary" onclick="history.back()">← Back</button>
        </div>`;
      document.getElementById("copyBtn").addEventListener("click", () => {
        navigator.clipboard.writeText(summary).then(() => {
          document.getElementById("copyBtn").textContent = "Copied ✓";
        });
      });
    }

    function showError(msg) {
      titleEl.textContent = "Couldn't summarize";
      content.innerHTML = `
        <div class="error-box">${esc(msg)}</div>
        <button class="btn-secondary" onclick="history.back()">← Back</button>`;
    }

    function showNoKey() {
      titleEl.textContent = "Setup needed";
      content.innerHTML = `
        <div class="no-key-box">
          No API key found. Open the TL;DR app from your home screen and save your Anthropic API key first.
        </div>
        <a href="/TLDR/" style="display:block">
          <button class="btn-primary" style="width:100%">Go to Settings</button>
        </a>`;
    }

    function esc(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
</body>
</html>
